name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      published: ${{ steps.semantic.outputs.new_release_published }}
      version: ${{ steps.semantic.outputs.new_release_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Semantic Release
        id: semantic
        uses: cycjimmy/semantic-release-action@v4
        with:
          extra_plugins: |
            @semantic-release/changelog@6
            @semantic-release/exec@6
            @semantic-release/git@10
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    needs: release
    if: needs.release.outputs.published == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-latest
            arch: arm64
          - target: x86_64-apple-darwin
            runner: macos-14
            arch: x64

    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: v${{ needs.release.outputs.version }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ matrix.target }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri app
        run: pnpm tauri build --target ${{ matrix.target }}

      - name: Ad-hoc sign app bundle
        run: |
          APP_PATH=$(find src-tauri/target/${{ matrix.target }}/release/bundle/macos -name "*.app" -maxdepth 1 | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "No .app found!" && exit 1
          fi
          echo "Signing: $APP_PATH"

          # Sign all nested binaries/dylibs/frameworks first (inside-out)
          find "$APP_PATH" -type f \( -name "*.dylib" -o -name "*.so" \) -exec codesign --force --sign - {} \;
          find "$APP_PATH/Contents/Frameworks" -name "*.framework" -maxdepth 1 2>/dev/null | while read fw; do
            codesign --force --sign - "$fw"
          done

          # Sign helper executables
          find "$APP_PATH/Contents/MacOS" -type f -perm +111 ! -name "$(basename "$APP_PATH" .app)" -exec codesign --force --sign - {} \;

          # Sign the main binary
          MAIN_BIN="$APP_PATH/Contents/MacOS/$(basename "$APP_PATH" .app)"
          if [ -f "$MAIN_BIN" ]; then
            codesign --force --sign - "$MAIN_BIN"
          fi

          # Sign the .app bundle itself
          codesign --force --sign - "$APP_PATH"

          # Verify
          codesign --verify --verbose=2 "$APP_PATH"
          echo "Signature valid!"

      - name: Re-package DMG with signed app
        run: |
          DMG_PATH=$(find src-tauri/target/${{ matrix.target }}/release/bundle/dmg -name "*.dmg" | head -1)
          APP_PATH=$(find src-tauri/target/${{ matrix.target }}/release/bundle/macos -name "*.app" -maxdepth 1 | head -1)
          if [ -n "$DMG_PATH" ] && [ -n "$APP_PATH" ]; then
            APP_NAME=$(basename "$APP_PATH")
            DMG_NAME=$(basename "$DMG_PATH")
            DMG_DIR=$(dirname "$DMG_PATH")
            TEMP_DIR=$(mktemp -d)

            rm -f "$DMG_PATH"
            cp -R "$APP_PATH" "$TEMP_DIR/$APP_NAME"
            ln -s /Applications "$TEMP_DIR/Applications"
            hdiutil create -volname "BranchPilot" -srcfolder "$TEMP_DIR" -ov -format UDZO "$DMG_DIR/$DMG_NAME"
            rm -rf "$TEMP_DIR"
            echo "Re-packaged: $DMG_DIR/$DMG_NAME"
          fi

      - name: Upload DMG to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.release.outputs.version }}
          files: |
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
